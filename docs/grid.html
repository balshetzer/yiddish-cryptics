  <style>
    /* Shared base/card/cell/button/keyboard/modal styles live in
       solver-common.css; only styles specific to this page are here. */

    /* ── The crossword grid ──
       The page is dir=rtl, and CSS grid auto-placement follows the writing
       direction, so emitting cells row by row in ascending JSON column order
       lands col 0 rightmost — the same convention as grid.json. */
    .cw-grid {
      display: grid;
      position: relative;
      grid-template-columns: repeat(var(--cols), var(--cell-size));
      grid-auto-rows: var(--cell-size);
      justify-content: center;
      --cell-size: min(2.3rem, calc((100vw - 3.5rem) / var(--cols)));
      margin-bottom: 1.6rem;
      user-select: none;
    }
    /* Snap the cell to a whole pixel where round() exists: buildGridLines()
       lays lines out at integer multiples of a rounded cell width, so a
       fractional track would let the two drift apart across the grid.
       Gated behind @supports rather than written as a plain fallback pair,
       because a custom property parses as any token stream — an older engine
       would happily accept an unknown round() and only fail later, inside
       grid-template-columns, collapsing the whole grid to a single column.
       Without round() the cells stay fractional, so the lines drift off them
       by the rounding error per column (~5px across 14 at 2.3rem) — degraded,
       but the grid still builds and stays playable. */
    @supports (width: round(down, 1px, 1px)) {
      .cw-grid {
        --cell-size: round(down, min(2.3rem, calc((100vw - 3.5rem) / var(--cols))), 1px);
      }
    }
    /* Structural grid lines are drawn once as a single SVG path (see
       buildGridLines()) rather than as per-cell borders. Two adjacent
       cells' borders are independent boxes that Chromium can rasterize
       a device pixel apart even at identical integer coordinates — an
       inherent limit of per-element hairline borders, not fixable by
       sizing alone. A single path painted in one pass has no such seam.
       Positioned absolutely (not a grid item — a spanning grid item
       reserves every cell and pushes the 224 auto-placed .cw-cells into
       new rows past it) with its offset computed in JS, because when the
       grid is wider than its centered card (common: fixed-px tracks vs.
       a max-width container), .cw-grid's own box sits narrower than its
       rendered tracks and left:0 here would misalign against them. */
    /* overflow:visible — a 1px stroke is centered on its path, so the
       outermost lines (running exactly along x=0/width, y=0/height) would
       otherwise have half their width clipped by the SVG viewport,
       rendering thinner than every interior line. */
    .cw-lines { position: absolute; pointer-events: none; overflow: visible; }
    .cw-cell { position: relative; }
    .cw-cell.cw-block { background: #3a3a3a; }
    .cw-cell .cell {
      width: 100%; height: 100%;
      border-width: 0;
      font-size: calc(var(--cell-size) * 0.55);
      padding-top: calc(var(--cell-size) * 0.16);
    }
    .cw-cell .cell.word-hl { background: #f6ecd4; }
    .cw-cell .cell.wrong { color: #a01818; background: #fbe9e9; }
    .cw-num {
      position: absolute; top: 0; right: 2px;
      font-size: calc(var(--cell-size) * 0.28);
      color: #9a7840; pointer-events: none; z-index: 2; line-height: 1.4;
    }

    /* ── Current-clue display ──
       All clues are stacked in the same grid area, invisible except the
       active one, so the box is always as tall as the LONGEST clue and the
       page never shifts when the selection changes. */
    .current-clue { display: grid; margin-bottom: 1rem; }
    .current-clue .cur-item {
      grid-area: 1 / 1; visibility: hidden;
      text-align: center; font-size: 1rem; line-height: 1.6; color: #1a1209;
      align-self: center;
    }
    .current-clue .cur-item.visible { visibility: visible; }
    .cur-num { font-weight: 600; color: #5a3e1b; }
    .cur-dir { color: #9a7840; font-size: 0.85em; }
    .cur-key-btn {
      display: none; color: #c4963a; font-size: 1rem;
      padding: 0 0.2rem; vertical-align: middle; border-radius: 3px;
      transition: background 0.1s;
    }
    .cur-item.solved .cur-key-btn { display: inline-block; }
    .cur-key-btn:hover { background: #f3ede0; }

    /* ── Clue lists ── */
    .clue-lists { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1.5rem; margin-top: 1.6rem; }
    @media (max-width: 540px) { .clue-lists { grid-template-columns: 1fr; } }
    .clue-sect-title {
      font-size: 1rem; font-weight: 600; color: #5a3e1b;
      margin-bottom: 0.6rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid #e4d8be; letter-spacing: 0.02em;
    }
    .clue-sect { margin-bottom: 1rem; }
    .gclue {
      display: flex; align-items: baseline; gap: 0.4rem;
      padding: 0.45rem 0.3rem; border-bottom: 1px solid #f0e8d5;
      font-size: 0.95rem; line-height: 1.55; cursor: pointer;
      border-radius: 2px; transition: background 0.1s;
    }
    .gclue:hover { background: #f7f0dd; }
    .gclue.active { background: #fdefc8; }
    .gclue-num { font-weight: 600; color: #5a3e1b; flex-shrink: 0; }
    .gclue-len { color: #7a6040; font-weight: 300; }
    .gclue.solved { color: #9a8560; }
    .gclue.solved .gclue-num { color: #9a8560; }
    .gclue-exp-btn {
      flex-shrink: 0; margin-right: auto; align-self: center;
      color: #c4963a; font-size: 1rem; padding: 0 0.2rem;
      display: none; border-radius: 3px; transition: background 0.1s;
    }
    .gclue.solved .gclue-exp-btn { display: block; }
    .gclue-exp-btn:hover { background: #f3ede0; }

    /* (.solved-banner and the explanation/hints detail styles are shared —
       see solver-common.css) */
    .modal-body .solved-banner { text-align: center; margin-top: 0.5rem; }

    /* ── Confirm dialog buttons ── */
    .confirm-text { font-size: 1rem; line-height: 1.7; margin-bottom: 1.2rem; }
    .confirm-actions { display: flex; justify-content: center; gap: 0.75rem; }

    .btn-row { flex-wrap: wrap; align-items: center; }

    .btn-clear {
      font-size: 0.85rem; color: #8a2020; border: 1.5px dashed #c09090;
      border-radius: 3px; padding: 0.4rem 0.9rem;
      background: transparent; transition: background 0.1s; white-space: nowrap;
    }
    .btn-clear:hover { background: #f8ecec; }

    /* ── Check menu (dropdown replacing the two check buttons) ── */
    .menu-wrap { position: relative; }
    .menu-caret {
      display: inline-block; font-size: 1.2em; margin-right: 0.2rem;
      transition: transform 0.15s;
    }
    #btn-check-menu.open .menu-caret { transform: rotate(180deg); }
    .menu-dropdown {
      position: absolute; top: calc(100% + 0.5rem); right: 0; z-index: 20;
      background: #fffdf7; border: 1px solid #d4c4a0; border-radius: 6px;
      box-shadow: 0 8px 24px rgba(43,29,8,0.18);
      width: max-content; padding: 0.4rem; display: flex; flex-direction: column; gap: 0.15rem;
    }
    .menu-dropdown.hidden { display: none; }
    .menu-item {
      font-family: inherit; font-size: 0.95rem; color: #2b1d08; text-align: right;
      padding: 0.55rem 0.7rem; border-radius: 4px; background: transparent; border: none;
      cursor: pointer; transition: background 0.1s; white-space: nowrap;
    }
    .menu-item:hover { background: #f3ede0; }
    .menu-item-toggle { display: flex; align-items: center; gap: 0.35rem; }
    /* Icon column always reserves its width, so the label doesn't shift
       left/right as the toggle switches on and off. */
    .menu-check-icon { width: 1em; text-align: center; color: #5a3e1b; visibility: hidden; }
    .menu-item-toggle.on .menu-check-icon { visibility: visible; }
  </style>

<main class="card">

  <div class="btn-row">
    <div class="menu-wrap">
      <button class="btn-primary" id="btn-check-menu">טשעק <span class="menu-caret sym-x">▾</span></button>
      <div class="menu-dropdown hidden" id="check-menu">
        <button class="menu-item" id="btn-check-word">דאָס וואָרט</button>
        <button class="menu-item" id="btn-check-all">אַלעס</button>
        <button class="menu-item menu-item-toggle" id="btn-auto-check">
          <span>אייביק</span>
          <span class="menu-check-icon"><i class="ti ti-check"></i></span>
        </button>
      </div>
    </div>
    <button class="btn-secondary" id="btn-hint">הילף</button>
    <button class="btn-reveal" id="btn-reveal" style="display:none">אַנטפּלעק אַן אות</button>
    <button class="btn-clear" id="btn-clear">מעק אויס אַלעס</button>
  </div>
  <div class="kb-divider"></div>
  <div class="current-clue" id="current-clue"></div>
  <div class="keyboard" id="keyboard"></div>
  <div class="clue-lists">
    <div class="clue-sect">
      <div class="clue-sect-title">געלייגט <span class="cur-dir sym-x">←</span></div>
      <div id="clues-across"></div>
    </div>
    <div class="clue-sect">
      <div class="clue-sect-title">שטייענדיק <span class="cur-dir sym-x">↓</span></div>
      <div id="clues-down"></div>
    </div>
  </div>
</main>

    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="normalize.js"></script>
<script src="solver-common.js"></script>
<script>
  // normaliseHebrew lives in normalize.js; KB_ROWS/buildKeyboard,
  // makeCellInput, the b64 codec, and the modal helpers live in
  // solver-common.js (both loaded above).

  const data = (typeof _pgd !== 'undefined') ? b64decode(_pgd) : null;
  if (!data) {
    document.querySelector('.card').textContent = 'קען נישט לייענען די דאַטן.';
    throw new Error('grid data missing — build with build_grid_solver.py');
  }

  const key = (r, c) => r + '-' + c;

  // Enumeration text for a word: computed from the display word, unless
  // the entry carries an explicit enum override ("2,3" style).
  const wordLengthSpec = w => w.enumSpec
    ? formatLengthSpec(w.enumSpec.replace(/,/g, ' '))
    : formatLengthSpec(answerToLengthSpec(w.word));

  // filler.py's blocked-grid format (blocks + entries) is adapted here into
  // the criss-cross shape (cells + placements) the rest of the page uses;
  // data.blocked additionally paints the non-word cells black.
  if (data.entries) {
    data.placements = data.entries.map(e => ({
      number: e.num, direction: e.dir, row: e.row, col: e.col,
      entry: e.answer, word: e.display,
      clue: e.clue || null, explanation: e.explanation || null,
      hints: e.hints || [], enumSpec: e.enum || null,
    }));
    const cellMap = {};
    data.placements.forEach(p => {
      const dr = p.direction === 'down' ? 1 : 0, dc = 1 - dr;
      [...p.entry].forEach((ch, i) => { cellMap[key(p.row + dr * i, p.col + dc * i)] = ch; });
    });
    data.cells = Object.entries(cellMap).map(([k, letter]) => {
      const [row, col] = k.split('-').map(Number);
      return { row, col, letter };
    });
    data.blocked = true;
  }

  // Solution letters and word records derived from the layout data.
  const solution = {};
  data.cells.forEach(c => { solution[key(c.row, c.col)] = c.letter; });

  const words = data.placements.map(p => {
    const dr = p.direction === 'down' ? 1 : 0;
    const dc = p.direction === 'across' ? 1 : 0;
    const coords = [];
    for (let i = 0; i < p.entry.length; i++) coords.push(key(p.row + dr * i, p.col + dc * i));
    return { ...p, id: p.direction + '-' + p.number, coords };
  });

  const cellWords = {};   // key -> { across: word, down: word }
  words.forEach(w => {
    w.coords.forEach(k => {
      (cellWords[k] = cellWords[k] || {})[w.direction] = w;
    });
  });

  // ═══════════════════════════════════════════════════════
  // State + persistence. The storage key embeds a fingerprint of the layout,
  // so state saved for an older grid is ignored rather than misapplied.
  // ═══════════════════════════════════════════════════════
  const cells = {};       // key -> { el, value, locked, wrap }
  const clueEls = {};     // word id -> clue-list element
  const curEls = {};      // word id -> current-clue display element
  const hintStates = {};  // word id -> { revealed } for renderHints (solver-common.js)
  let active = { key: null, dir: 'across' };
  const solvedIds = new Set();

  const layoutHash = (() => {
    const s = data.rows + 'x' + data.cols + ':' + words.map(w => w.id + '@' + w.coords[0] + '=' + w.entry).join(';');
    let h = 5381;
    for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) >>> 0;
    return h.toString(36);
  })();
  const STORAGE_KEY = 'yiddish-grid-' + layoutHash;

  function saveState() {
    const v = {};
    Object.entries(cells).forEach(([k, c]) => { if (c.value) v[k] = c.value; });
    const locked = Object.keys(cells).filter(k => cells[k].locked);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ v, solved: [...solvedIds], locked }));
    } catch (e) { /* storage unavailable (private mode) — play without saving */ }
  }

  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; }
    catch (e) { return null; }
  }

  function clearState() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    solvedIds.clear();
    Object.values(hintStates).forEach(s => { s.revealed = 0; });
    Object.values(cells).forEach(c => {
      c.value = ''; c.locked = false;
      c.el.value = '';
      c.el.classList.remove('locked', 'wrong');
      c.el.removeAttribute('readonly');
    });
    Object.values(clueEls).forEach(el => el.classList.remove('solved'));
    Object.values(curEls).forEach(el => el.classList.remove('solved'));
    selectWord(words[0], true);
  }

  // ═══════════════════════════════════════════════════════
  // Grid DOM
  // ═══════════════════════════════════════════════════════
  function buildGridDom() {
    const grid = document.getElementById('cw-grid');
    grid.style.setProperty('--cols', data.cols);
    grid.style.setProperty('--rows', data.rows);
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'cw-lines');
    svg.setAttribute('preserveAspectRatio', 'none');
    const numbers = {};
    words.forEach(w => {
      const k = w.coords[0];
      if (!(k in numbers)) numbers[k] = w.number;
    });

    for (let r = 0; r < data.rows; r++) {
      for (let c = 0; c < data.cols; c++) {
        const k = key(r, c);
        const wrap = document.createElement('div');
        wrap.className = 'cw-cell';
        if (k in solution) {
          const input = makeCellInput();
          input.addEventListener('focus', () => selectCell(k, false));
          input.addEventListener('mousedown', e => {
            // Locked cells never take browser focus — select through them
            // instead (selectCell redirects the cursor to an unlocked cell).
            if (cells[k].locked) { e.preventDefault(); selectCell(k, false); return; }
            // A second click on the already-active cell toggles direction.
            if (active.key === k) { e.preventDefault(); selectCell(k, true); }
          });
          input.addEventListener('input', () => {
            if (isModalOpen() || cells[k].locked) { input.value = cells[k].value; return; }
            const raw = input.value; input.value = cells[k].value;
            const norm = normaliseHebrew(raw);
            if (norm) inputLetters(norm);
          });
          input.addEventListener('keydown', onCellKeydown);
          if (numbers[k] != null) {
            const num = document.createElement('span');
            num.className = 'cw-num';
            num.textContent = numbers[k];
            wrap.appendChild(num);
          }
          wrap.appendChild(input);
          cells[k] = { el: input, value: '', locked: false, wrap };
        } else if (data.blocked) {
          wrap.classList.add('cw-block');
        }
        grid.appendChild(wrap);
      }
    }
    // Appended last (painted on top): every filled cell has an opaque
    // background (plain white, or the tan word/focus highlight), which
    // would otherwise completely hide any grid line drawn underneath it —
    // only lines bordering an empty, backgroundless block cell would
    // survive, which is exactly the "outline only, no interior dividers"
    // look this fixes.
    grid.appendChild(svg);
  }

  // Draws every structural grid line as one SVG path instead of per-cell
  // borders. viewBox is set to the grid's *actual measured pixel size*, so
  // one user unit is exactly one CSS pixel and every coordinate below is
  // an integer — with shape-rendering:crispEdges that paints as a single
  // razor-sharp stroke, immune to the sub-pixel seams that per-cell
  // borders can show even at identical integer positions.
  function buildGridLines() {
    const grid = document.getElementById('cw-grid');
    const svg = grid.querySelector('.cw-lines');
    const wraps = [...grid.querySelectorAll('.cw-cell')];
    // Row 0's cells give us the true track origin and size. Read these
    // from the cells themselves, not grid.getBoundingClientRect(): a grid
    // wider than its centered card (fixed-px tracks vs. a max-width
    // container) renders its tracks past the container's own box, so the
    // container's box can't be trusted as the tracks' origin or width.
    const firstCellRect = wraps[0].getBoundingClientRect();       // col 0 (rightmost)
    const lastCellRect = wraps[data.cols - 1].getBoundingClientRect(); // col cols-1 (leftmost)
    const cellPx = Math.round(firstCellRect.width);
    const gridBoxRect = grid.getBoundingClientRect();
    const offsetLeft = lastCellRect.left - gridBoxRect.left;
    const offsetTop = firstCellRect.top - gridBoxRect.top;
    const w = cellPx * data.cols, h = cellPx * data.rows;
    svg.style.left = offsetLeft + 'px';
    svg.style.top = offsetTop + 'px';
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);

    // col 0 is the rightmost column (see key()/solution note above), so
    // physical x (0 = left edge of the grid) runs opposite to col index.
    const left = c => (data.cols - 1 - c) * cellPx;
    let d = '';
    for (let r = 0; r < data.rows; r++) {
      for (let c = 0; c < data.cols; c++) {
        if (!(key(r, c) in solution)) continue;
        const x0 = left(c), x1 = x0 + cellPx, y0 = r * cellPx, y1 = y0 + cellPx;
        const hasRight = key(r, c - 1) in solution;
        const hasDown = key(r + 1, c) in solution;
        d += `M${x0} ${y0}L${x1} ${y0} `;   // top: always
        d += `M${x0} ${y0}L${x0} ${y1} `;   // physical left: always
        if (!hasRight) d += `M${x1} ${y0}L${x1} ${y1} `;
        if (!hasDown) d += `M${x0} ${y1}L${x1} ${y1} `;
      }
    }
    svg.innerHTML =
      `<path d="${d}" fill="none" stroke="#8a7050" stroke-width="1" shape-rendering="crispEdges"/>`;
  }

  function onCellKeydown(e) {
    if (isModalOpen()) return;
    if (e.key === 'Backspace' || e.key === 'Delete') { e.preventDefault(); doBackspace(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); moveSpatial(0, -1); }
    else if (e.key === 'ArrowLeft')  { e.preventDefault(); moveSpatial(0, +1); }
    else if (e.key === 'ArrowUp')    { e.preventDefault(); moveSpatial(-1, 0); }
    else if (e.key === 'ArrowDown')  { e.preventDefault(); moveSpatial(+1, 0); }
    else if (e.key === 'Enter')      { e.preventDefault(); checkActiveWord(); }
  }

  // Move to the nearest fillable cell in a straight line from the active one.
  // (dr, dc) is in grid coordinates: col +1 is one cell further LEFT visually,
  // so ArrowLeft maps to dc +1 and ArrowRight to dc -1.
  function moveSpatial(dr, dc) {
    if (!active.key) return;
    let [r, c] = active.key.split('-').map(Number);
    for (;;) {
      r += dr; c += dc;
      if (r < 0 || c < 0 || r >= data.rows || c >= data.cols) return;
      const k = key(r, c);
      // Locked cells can't take input, so arrow keys glide over them.
      if (k in cells && !cells[k].locked) { selectCell(k, false); return; }
    }
  }

  // ═══════════════════════════════════════════════════════
  // Selection + highlighting
  // ═══════════════════════════════════════════════════════
  function activeWord() {
    return active.key ? (cellWords[active.key] || {})[active.dir] || null : null;
  }

  function selectCell(k, toggle) {
    const wordsHere = cellWords[k] || {};
    let dir = active.dir;
    if (toggle && wordsHere.across && wordsHere.down) {
      dir = dir === 'across' ? 'down' : 'across';
    }
    if (!wordsHere[dir]) dir = wordsHere.across ? 'across' : 'down';
    let target = k;
    if (cells[k].locked) {
      // A locked cell can't take input: still select a word through it (so
      // its clue shows), but prefer a direction with work left and land the
      // cursor on that word's first unlocked cell.
      for (const d of [dir, dir === 'across' ? 'down' : 'across']) {
        const w = wordsHere[d];
        if (w && w.coords.some(kk => !cells[kk].locked)) { dir = d; break; }
      }
      target = wordsHere[dir].coords.find(kk => !cells[kk].locked) || k;
    }
    active = { key: target, dir };
    refreshHighlight();
  }

  function selectWord(w, focus) {
    // Land on the first unlocked cell of the word (or its start if all locked).
    const target = w.coords.find(k => !cells[k].locked) || w.coords[0];
    active = { key: target, dir: w.direction };
    refreshHighlight();
    if (focus) cells[target].el.focus();
  }

  function refreshHighlight() {
    Object.values(cells).forEach(c => c.el.classList.remove('active', 'word-hl'));
    Object.values(clueEls).forEach(el => el.classList.remove('active'));
    Object.values(curEls).forEach(el => el.classList.remove('visible'));
    const w = activeWord();
    if (w) {
      // Locked cells keep their locked look — no word highlight.
      w.coords.forEach(k => { if (!cells[k].locked) cells[k].el.classList.add('word-hl'); });
      clueEls[w.id].classList.add('active');
      curEls[w.id].classList.add('visible');
    }
    if (active.key && !cells[active.key].locked) {
      const el = cells[active.key].el;
      el.classList.add('active');
      if (document.activeElement !== el) el.focus();
      // Select any existing letter so the next keystroke replaces it instead
      // of appending — a plain input.value doesn't clear/select on its own,
      // and the cell allows up to 10 chars (see makeCellInput) so a keystroke
      // typed at the end of an existing value would otherwise land as a
      // second character, which inputLetters would then write into the
      // *next* cell rather than overwriting this one.
      el.select();
    } else if (document.activeElement && document.activeElement.classList.contains('cell')) {
      // No focusable active cell this time (e.g. a fully locked word was
      // selected) — blur the previously focused cell so it stops showing
      // the :focus highlight as if it were still selected.
      document.activeElement.blur();
    }
    updateHelpButtons();
  }

  function focusActive() {
    if (active.key && !cells[active.key].locked) cells[active.key].el.focus();
  }

  // ═══════════════════════════════════════════════════════
  // Typing
  // ═══════════════════════════════════════════════════════
  function setCellValue(k, ch) {
    const c = cells[k];
    c.value = ch;
    c.el.value = ch;
    c.el.classList.remove('wrong');
  }

  // Position of the active cell within the active word, or -1.
  function activePos(w) { return w.coords.indexOf(active.key); }

  function inputLetters(chars) {
    let w = activeWord();
    if (!w) return;
    for (const ch of chars) {
      let pos = activePos(w);
      while (pos < w.coords.length && cells[w.coords[pos]].locked) pos++;
      if (pos >= w.coords.length) break;
      setCellValue(w.coords[pos], ch);
      // advance to the next cell of the word (locked ones are skipped above)
      if (pos + 1 < w.coords.length) active.key = w.coords[pos + 1];
    }
    refreshHighlight();
    saveState();
    // Auto-check runs checkWord() directly (not checkActiveWord()/checkAll()),
    // so it never shakes the check button — shaking is reserved for an
    // explicit, deliberate check, and would be constant and annoying if it
    // fired on every keystroke while a word is still half-typed or wrong.
    if (autoCheck) {
      const res = checkWord(w);
      if (res === 'solved') afterSolveCheck();
    }
  }

  function doBackspace() {
    const w = activeWord();
    if (!w) return;
    const c = cells[active.key];
    if (!c.locked && c.value) {
      setCellValue(active.key, '');
    } else {
      let pos = activePos(w) - 1;
      while (pos >= 0 && cells[w.coords[pos]].locked) pos--;
      if (pos >= 0) {
        active.key = w.coords[pos];
        setCellValue(active.key, '');
      }
    }
    refreshHighlight();
    saveState();
  }

  // ═══════════════════════════════════════════════════════
  // Checking + solving
  // ═══════════════════════════════════════════════════════
  function shake(btn) {
    btn.classList.remove('shake'); void btn.offsetWidth; btn.classList.add('shake');
    btn.addEventListener('animationend', () => btn.classList.remove('shake'), { once: true });
  }

  // Returns 'incomplete' | 'wrong' | 'solved'. Checks whichever letters are
  // filled in — locking correct ones in place and flagging wrong ones red —
  // and leaves blank cells alone. Only marks the word 'solved' once every
  // cell is both filled and correct.
  function checkWord(w) {
    if (solvedIds.has(w.id)) return 'solved';
    let anyWrong = false;
    let allFilled = true;
    w.coords.forEach(k => {
      if (!cells[k].value) { allFilled = false; return; }
      if (cells[k].value === solution[k]) {
        if (!cells[k].locked) lockCellAt(k, solution[k]);
      } else {
        anyWrong = true;
        cells[k].el.classList.add('wrong');
      }
    });
    if (allFilled && !anyWrong) { solveWord(w); return 'solved'; }
    refreshHighlight();
    saveState();
    return anyWrong ? 'wrong' : 'incomplete';
  }

  function lockCellAt(k, letter) {
    const c = cells[k];
    c.value = letter;
    c.el.value = letter;
    c.locked = true;
    c.el.classList.add('locked');
    c.el.classList.remove('wrong');
    c.el.setAttribute('readonly', 'true');
  }

  function solveWord(w) {
    solvedIds.add(w.id);
    w.coords.forEach(k => lockCellAt(k, solution[k]));
    clueEls[w.id].classList.add('solved');
    curEls[w.id].classList.add('solved');   // shows the 🔑 in the current-clue box
    refreshHighlight();   // freshly locked cells must drop active/word styling
    saveState();
  }

  function checkActiveWord() {
    const w = activeWord();
    if (!w) return;
    const res = checkWord(w);
    if (res === 'wrong') { shake(document.getElementById('btn-check-menu')); return; }
    afterSolveCheck();
  }

  function checkAll() {
    let anyBad = false;
    words.forEach(w => {
      const res = checkWord(w);
      if (res === 'wrong') anyBad = true;
    });
    if (anyBad) { shake(document.getElementById('btn-check-menu')); return; }
    afterSolveCheck();
  }

  function afterSolveCheck() {
    if (solvedIds.size === words.length) showSolvedAll();
    else focusActive();
  }

  // ═══════════════════════════════════════════════════════
  // Auto-check — a standing preference (not tied to any one puzzle), so it
  // carries over between grids rather than living under STORAGE_KEY.
  // ═══════════════════════════════════════════════════════
  const AUTOCHECK_KEY = 'yiddish-grid-autocheck';
  let autoCheck = false;
  try { autoCheck = localStorage.getItem(AUTOCHECK_KEY) === '1'; } catch (e) {}

  // Checks every word without shaking — used both when auto-check is
  // switched on (to catch up on what's already filled in) and to silently
  // re-validate a restored board at load.
  function silentCheckAll() {
    words.forEach(w => checkWord(w));
  }

  function setAutoCheck(on) {
    autoCheck = on;
    try { localStorage.setItem(AUTOCHECK_KEY, on ? '1' : '0'); } catch (e) {}
    document.getElementById('btn-auto-check').classList.toggle('on', on);
    if (on) {
      silentCheckAll();
      if (solvedIds.size === words.length) showSolvedAll();
      else focusActive();
    }
  }

  // ═══════════════════════════════════════════════════════
  // Hints + reveal — per active word, built on renderHints and
  // revealNextLetterIn from solver-common.js (cryptic.html uses the same).
  // ═══════════════════════════════════════════════════════
  function updateHelpButtons() {
    const w = activeWord();
    document.getElementById('btn-hint').style.display =
      (w && (w.hints || []).length > 0 && !solvedIds.has(w.id)) ? '' : 'none';
    document.getElementById('btn-reveal').style.display =
      (!w || w.coords.every(k => cells[k].locked)) ? 'none' : '';
  }

  function openWordHints() {
    const w = activeWord();
    if (!w) return;
    const state = hintStates[w.id] = hintStates[w.id] || { revealed: 0 };
    renderHints(setModal('הילף'), w.hints || [], state, { onExhausted: updateHelpButtons });
    openModal();
    updateHelpButtons();
  }

  function revealLetter() {
    const w = activeWord();
    if (!w) return;
    const states = w.coords.map(k => cells[k]);
    const idx = revealNextLetterIn(states, w.entry, (i, letter) => lockCellAt(w.coords[i], letter));
    if (idx < 0) return;
    // Like cryptic.html's advanceActiveAfterLock: if the active cell is now
    // locked, move forward (cyclically within the word) to an unlocked one.
    if (cells[active.key].locked) {
      const pos = activePos(w);
      for (let d = 1; d <= w.coords.length; d++) {
        const next = w.coords[(pos + d) % w.coords.length];
        if (!cells[next].locked) { active.key = next; break; }
      }
    }
    refreshHighlight();
    saveState();
    if (w.coords.every(k => cells[k].locked)) {
      if (!solvedIds.has(w.id)) solveWord(w);
      afterSolveCheck();
    }
  }

  // ═══════════════════════════════════════════════════════
  // Modal contents (explanation / confirm-clear / solved-all)
  // ═══════════════════════════════════════════════════════
  function setModal(title) {
    document.getElementById('modal-title').textContent = title;
    const body = document.getElementById('modal-body');
    body.innerHTML = '';
    return body;
  }

  // The 🔑 modal: clue, then the same explanation + available-hints details
  // cryptic.html shows in its solved view (renderSolvedDetails, shared).
  function showExplanation(w) {
    const body = setModal(w.word);
    const clue = document.createElement('div');
    clue.className = 'hint-item';
    clue.textContent = w.clue ? w.clue : w.word;
    body.appendChild(clue);
    const details = document.createElement('div');
    renderSolvedDetails(details, w.explanation, w.hints || []);
    body.appendChild(details);
    openModal();
  }

  function confirmClear() {
    const body = setModal('מעק אויס אַלעס');
    const text = document.createElement('p');
    text.className = 'confirm-text';
    text.textContent = 'ביסטו זיכער? דאָס וועט אױסמאַקן אַלע אײַנגעשריבענע אותיות און מען וועט דאַרפֿן אָנהייבן פֿון אָנהײב.';
    const actions = document.createElement('div');
    actions.className = 'confirm-actions';
    const yes = document.createElement('button');
    yes.className = 'btn-primary';
    yes.textContent = 'יאָ, מעק אויס';
    yes.addEventListener('click', () => { closeModal(); clearState(); });
    const no = document.createElement('button');
    no.className = 'btn-secondary';
    no.textContent = 'ניין';
    no.addEventListener('click', () => { closeModal(); focusActive(); });
    actions.appendChild(yes); actions.appendChild(no);
    body.appendChild(text); body.appendChild(actions);
    openModal();
  }

  function showSolvedAll() {
    const body = setModal('');
    const banner = document.createElement('div');
    banner.className = 'solved-banner';
    banner.textContent = 'געלייזט!';
    const text = document.createElement('p');
    text.style.cssText = 'text-align:center;font-size:1rem;color:#5a3e1b;margin-bottom:0.5rem;';
    text.textContent = 'דו האָסט געלייזט דאָס גאַנצע קעסטל־רעטעניש. יישר־כּוח!';
    body.appendChild(banner); body.appendChild(text);
    openModal();
  }

  // ═══════════════════════════════════════════════════════
  // Clue lists
  // ═══════════════════════════════════════════════════════
  function buildClueLists() {
    const containers = {
      across: document.getElementById('clues-across'),
      down: document.getElementById('clues-down'),
    };
    words.forEach(w => {
      const el = document.createElement('div');
      el.className = 'gclue';
      const num = document.createElement('span');
      num.className = 'gclue-num';
      num.textContent = w.number + '.';
      const text = document.createElement('span');
      text.appendChild(document.createTextNode((w.clue ? w.clue : w.word) + ' '));
      const len = document.createElement('span');
      len.className = 'gclue-len';
      len.textContent = wordLengthSpec(w);
      text.appendChild(len);
      const expBtn = document.createElement('button');
      expBtn.className = 'gclue-exp-btn';
      expBtn.innerHTML = '<i class="ti ti-key"></i>';
      expBtn.title = 'אױסטײַטש';
      expBtn.addEventListener('click', e => { e.stopPropagation(); showExplanation(w); });
      el.appendChild(num); el.appendChild(text); el.appendChild(expBtn);
      el.addEventListener('click', () => selectWord(w, true));
      containers[w.direction].appendChild(el);
      clueEls[w.id] = el;
    });
  }

  // One display element per clue, all stacked in the same place above the
  // keyboard; refreshHighlight() reveals the active one. Because every item
  // occupies the box, its height fits the longest clue and never changes.
  function buildCurrentClue() {
    const wrapEl = document.getElementById('current-clue');
    words.forEach(w => {
      const item = document.createElement('div');
      item.className = 'cur-item';
      const num = document.createElement('span');
      num.className = 'cur-num';
      num.textContent = w.number + '.';
      const dir = document.createElement('span');
      dir.className = 'cur-dir sym-x';
      dir.textContent = w.direction === 'across' ? '←' : '↓';
      const len = document.createElement('span');
      len.className = 'gclue-len';
      len.textContent = wordLengthSpec(w);
      const keyBtn = document.createElement('button');
      keyBtn.className = 'cur-key-btn';
      keyBtn.innerHTML = '<i class="ti ti-key"></i>';
      keyBtn.title = 'אױסטײַטש';
      keyBtn.addEventListener('click', () => showExplanation(w));
      item.appendChild(num);
      item.appendChild(document.createTextNode(' '));
      item.appendChild(dir);
      item.appendChild(document.createTextNode(' ' + (w.clue ? w.clue : w.word) + ' '));
      item.appendChild(len);
      item.appendChild(document.createTextNode(' '));
      item.appendChild(keyBtn);
      wrapEl.appendChild(item);
      curEls[w.id] = item;
    });
  }

  // ═══════════════════════════════════════════════════════
  // Init
  // ═══════════════════════════════════════════════════════
  buildGridDom();
  buildGridLines();
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(buildGridLines, 100);
  });
  buildClueLists();
  buildCurrentClue();
  buildKeyboard(document.getElementById('keyboard'), {
    onLetter(k) {
      const n = normaliseHebrew(k);
      if (n && active.key && cells[active.key]) {
        const el = cells[active.key].el;
        el.value = n;
        el.dispatchEvent(new Event('input', { bubbles: true }));
      }
    },
    onBackspace: doBackspace,
    afterKey: focusActive,
  });

  const checkMenuBtn = document.getElementById('btn-check-menu');
  const checkMenu = document.getElementById('check-menu');
  function closeCheckMenu() {
    checkMenu.classList.add('hidden');
    checkMenuBtn.classList.remove('open');
  }
  function toggleCheckMenu() {
    const wasHidden = checkMenu.classList.contains('hidden');
    closeCheckMenu();
    if (wasHidden) { checkMenu.classList.remove('hidden'); checkMenuBtn.classList.add('open'); }
  }
  checkMenuBtn.addEventListener('click', e => { e.stopPropagation(); toggleCheckMenu(); });
  document.addEventListener('click', e => {
    if (!checkMenu.classList.contains('hidden') && !e.target.closest('.menu-wrap')) closeCheckMenu();
  });

  document.getElementById('btn-check-word').addEventListener('click', () => { closeCheckMenu(); checkActiveWord(); });
  document.getElementById('btn-check-all').addEventListener('click', () => { closeCheckMenu(); checkAll(); });
  document.getElementById('btn-auto-check').addEventListener('click', () => { closeCheckMenu(); setAutoCheck(!autoCheck); });
  document.getElementById('btn-hint').addEventListener('click', openWordHints);
  document.getElementById('btn-reveal').addEventListener('click', revealLetter);
  document.getElementById('btn-clear').addEventListener('click', confirmClear);
  document.getElementById('modal-close').onclick = () => { closeModal(); focusActive(); };
  document.getElementById('modal-overlay').onclick = e => {
    if (e.target === e.currentTarget) { closeModal(); focusActive(); }
  };
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && isModalOpen()) { closeModal(); focusActive(); }
    else if (e.key === 'Escape' && !checkMenu.classList.contains('hidden')) closeCheckMenu();
  });

  // Restore saved progress (values first, then re-solve saved word ids —
  // verifying each against the solution rather than trusting the store).
  const saved = loadState();
  if (saved && saved.v) {
    Object.entries(saved.v).forEach(([k, ch]) => {
      if (k in cells && typeof ch === 'string' && ch.length === 1) setCellValue(k, ch);
    });
    (saved.solved || []).forEach(id => {
      const w = words.find(x => x.id === id);
      if (w && w.coords.every(k => cells[k].value === solution[k])) solveWord(w);
    });
    // Individually revealed (locked but unsolved-word) cells — re-lock only
    // those whose saved letter is actually correct.
    (saved.locked || []).forEach(k => {
      if (k in cells && cells[k].value === solution[k]) lockCellAt(k, solution[k]);
    });
  }

  document.getElementById('btn-auto-check').classList.toggle('on', autoCheck);
  if (autoCheck) silentCheckAll();

  selectWord(words[0], false);
  if (solvedIds.size === words.length && words.length > 0) { /* already fully solved — leave as-is */ }
</script>
</body>
</html>
